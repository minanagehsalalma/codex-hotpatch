name: publish-hotpatch

on:
  workflow_call:
    inputs:
      codex_version:
        description: Upstream Codex version to package
        required: false
        type: string
      upstream_repo:
        description: Upstream GitHub repo to detect and checkout
        required: false
        type: string
        default: openai/codex
      upstream_source:
        description: Upstream binary source mode
        required: false
        type: string
        default: npm
      build_mode:
        description: Overlay build mode
        required: false
        type: string
        default: rebuild
      include_prereleases:
        description: Include prereleases when auto-detecting the upstream release
        required: false
        type: boolean
        default: false
      release_tag:
        description: Release tag for the hotpatch assets
        required: false
        type: string
  workflow_dispatch:
    inputs:
      codex_version:
        description: Upstream Codex version to package
        required: true
      upstream_repo:
        description: Upstream GitHub repo to detect and checkout
        required: false
        default: openai/codex
      upstream_source:
        description: Upstream binary source mode
        required: false
        default: npm
        type: choice
        options:
          - npm
          - github-release
      build_mode:
        description: Overlay build mode
        required: false
        default: rebuild
        type: choice
        options:
          - rebuild
          - prebuilt-only
      include_prereleases:
        description: Include prereleases when auto-detecting the upstream release
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag for the hotpatch assets
        required: true

permissions:
  contents: write

concurrency:
  group: publish-hotpatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      codex_version: ${{ steps.detect.outputs.codex_version }}
      codex_ref: ${{ steps.detect.outputs.codex_ref }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      upstream_repo: ${{ steps.detect.outputs.upstream_repo }}
      upstream_source: ${{ steps.detect.outputs.upstream_source }}
      target_matrix: ${{ steps.detect.outputs.target_matrix }}
      build_mode: ${{ steps.detect.outputs.build_mode }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: detect
        shell: bash
        run: |
          mkdir -p dist/debug
          TARGET_INPUT="${{ inputs.codex_version }}"
          UPSTREAM_REPO="${{ inputs.upstream_repo }}"
          UPSTREAM_SOURCE="${{ inputs.upstream_source }}"
          BUILD_MODE="${{ inputs.build_mode }}"
          INCLUDE_PRERELEASES="${{ inputs.include_prereleases }}"
          node ./scripts/detect-upstream-release.mjs --repo "$UPSTREAM_REPO" --include-prereleases "$INCLUDE_PRERELEASES" --field json --output dist/debug/upstream-release.json > /dev/null
          if [ -z "$TARGET_INPUT" ]; then
            TARGET_INPUT="$(node ./scripts/detect-upstream-release.mjs --repo "$UPSTREAM_REPO" --include-prereleases "$INCLUDE_PRERELEASES" --field tagName)"
          fi
          TARGET_MATRIX="$(node ./scripts/resolve-upstream-matrix.mjs --source "$UPSTREAM_SOURCE" --release-json dist/debug/upstream-release.json)"
          REF="$(node ./scripts/resolve-release-target.mjs --version "$TARGET_INPUT" --field codexRef)"
          VERSION="$(node ./scripts/resolve-release-target.mjs --version "$TARGET_INPUT" --field codexVersion)"
          echo "codex_ref=$REF" >> "$GITHUB_OUTPUT"
          echo "codex_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_repo=$UPSTREAM_REPO" >> "$GITHUB_OUTPUT"
          echo "upstream_source=$UPSTREAM_SOURCE" >> "$GITHUB_OUTPUT"
          echo "build_mode=$BUILD_MODE" >> "$GITHUB_OUTPUT"
          echo "target_matrix=$TARGET_MATRIX" >> "$GITHUB_OUTPUT"
          RELEASE_TAG="$(node ./scripts/resolve-release-target.mjs --version "$TARGET_INPUT" --release-tag "${{ inputs.release_tag }}" --field releaseTag)"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  fetch-upstream:
    needs: detect-upstream
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-upstream.outputs.target_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch official upstream binary
        shell: bash
        run: |
          mkdir -p dist/upstream
          node ./scripts/fetch-upstream-binary.mjs \
            --source "${{ needs.detect-upstream.outputs.upstream_source }}" \
            --repo "${{ needs.detect-upstream.outputs.upstream_repo }}" \
            --codex-version "${{ needs.detect-upstream.outputs.codex_version }}" \
            --tag "${{ needs.detect-upstream.outputs.codex_ref }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --output "dist/upstream/${{ matrix.executable_name }}"
      - uses: actions/upload-artifact@v7
        with:
          name: upstream-${{ matrix.artifact_suffix }}
          path: dist/upstream/${{ matrix.executable_name }}

  build-overlay:
    needs: [detect-upstream, fetch-upstream]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-upstream.outputs.target_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        if: needs.detect-upstream.outputs.build_mode == 'prebuilt-only'
        with:
          name: upstream-${{ matrix.artifact_suffix }}
          path: artifacts/upstream
      - uses: actions/checkout@v6
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        with:
          repository: ${{ needs.detect-upstream.outputs.upstream_repo }}
          ref: ${{ needs.detect-upstream.outputs.codex_ref }}
          path: upstream
      - uses: dtolnay/rust-toolchain@stable
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
      - uses: Swatinem/rust-cache@v2
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        with:
          shared-key: publish-${{ matrix.platform }}-${{ needs.detect-upstream.outputs.codex_version }}
          cache-on-failure: "true"
          workspaces: |
            upstream/codex-rs -> upstream/codex-rs/target
      - name: Install Linux build dependencies
        if: needs.detect-upstream.outputs.build_mode == 'rebuild' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev pkg-config
      - name: Apply maintained hot-reload patch program
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        shell: bash
        run: |
          mkdir -p dist/debug
          node ./scripts/apply-maintained-patch.mjs --upstream-root ./upstream --json > dist/debug/patch-report-${{ matrix.artifact_suffix }}.json
      - name: Run focused regressions
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        shell: bash
        working-directory: upstream/codex-rs
        run: |
          export CODEX_TEST_CODEX_HOME_ROOT="$PWD/.codex-test-home"
          mkdir -p "$CODEX_TEST_CODEX_HOME_ROOT"
          cargo test -p codex-core --lib client::tests::current_client_setup_reloads_auth_from_disk_between_turns -- --exact
          cargo test -p codex-core --test all suite::client_websockets::responses_websocket_reconnects_when_auth_snapshot_changes_between_turns -- --exact
      - name: Build patched Codex CLI
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        shell: bash
        working-directory: upstream/codex-rs
        run: cargo build -p codex-cli --release --locked
      - name: Package rebuilt overlay artifact
        if: needs.detect-upstream.outputs.build_mode == 'rebuild'
        shell: bash
        run: |
          mkdir -p dist/overlay
          cp "upstream/codex-rs/target/release/${{ matrix.executable_name }}" "dist/overlay/codex-${{ needs.detect-upstream.outputs.codex_version }}-${{ matrix.artifact_suffix }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
      - name: Package prebuilt overlay artifact
        if: needs.detect-upstream.outputs.build_mode == 'prebuilt-only'
        shell: bash
        run: |
          mkdir -p dist/overlay
          SOURCE_FILE="$(find artifacts/upstream -type f | head -n 1)"
          cp "$SOURCE_FILE" "dist/overlay/codex-${{ needs.detect-upstream.outputs.codex_version }}-${{ matrix.artifact_suffix }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
      - uses: actions/upload-artifact@v7
        with:
          name: overlay-${{ matrix.artifact_suffix }}
          path: dist/overlay/*
      - name: Upload debug bundle on failure
        if: failure() && needs.detect-upstream.outputs.build_mode == 'rebuild'
        uses: actions/upload-artifact@v7
        with:
          name: debug-${{ matrix.artifact_suffix }}
          path: |
            dist/debug/*
            upstream/codex-rs/core/src/client.rs
            upstream/codex-rs/core/src/client_tests.rs
            upstream/codex-rs/core/tests/common/responses.rs
            upstream/codex-rs/core/tests/suite/client_websockets.rs

  build-manifests:
    needs: [detect-upstream, fetch-upstream, build-overlay]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-upstream.outputs.target_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: upstream-${{ matrix.artifact_suffix }}
          path: artifacts/upstream
      - uses: actions/download-artifact@v8
        with:
          name: overlay-${{ matrix.artifact_suffix }}
          path: artifacts/overlay
      - name: Generate manifest slice
        shell: bash
        run: |
          OVERLAY_FILE="$(find artifacts/overlay -type f | head -n 1)"
          OVERLAY_NAME="$(basename "$OVERLAY_FILE")"
          RELEASE_TAG="${{ needs.detect-upstream.outputs.release_tag }}"
          node ./scripts/generate-manifest.mjs \
            --codex-version "${{ needs.detect-upstream.outputs.codex_version }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --upstream-binary "$(find artifacts/upstream -type f | head -n 1)" \
            --overlay-binary "$OVERLAY_FILE" \
            --overlay-filename "$OVERLAY_NAME" \
            --overlay-url "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/$OVERLAY_NAME" \
            --output "dist/manifests/${{ matrix.artifact_suffix }}.json"
      - uses: actions/upload-artifact@v7
        with:
          name: manifest-${{ matrix.artifact_suffix }}
          path: dist/manifests/${{ matrix.artifact_suffix }}.json

  publish:
    needs: [detect-upstream, build-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          pattern: manifest-*
          merge-multiple: true
          path: dist/manifests
      - uses: actions/download-artifact@v8
        with:
          pattern: overlay-*
          merge-multiple: true
          path: dist/overlays
      - name: Merge manifest slices
        run: node ./scripts/merge-manifests.mjs --input-dir dist/manifests --output dist/release/manifest.json
      - name: Validate release manifest
        run: node ./scripts/validate-release-manifest.mjs --manifest dist/release/manifest.json --repo ${{ github.repository }} --tag ${{ needs.detect-upstream.outputs.release_tag }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect-upstream.outputs.release_tag }}
          files: |
            dist/release/manifest.json
            dist/overlays/*
